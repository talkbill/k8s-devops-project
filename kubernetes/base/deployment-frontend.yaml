apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: devops-app
  labels:
    app: frontend
    component: ui
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: frontend
        component: ui
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "80"
    spec:
      # Pod-level security context
      securityContext:
        runAsNonRoot: true
        runAsUser: 101 
        runAsGroup: 101
        seccompProfile:
          type: RuntimeDefault

      volumes:
      - name: nginx-cache
        emptyDir:
          medium: Memory
          sizeLimit: 64Mi
      - name: nginx-run
        emptyDir:
          medium: Memory
          sizeLimit: 1Mi
      - name: nginx-logs
        emptyDir:
          medium: Memory
          sizeLimit: 32Mi
      - name: tmp
        emptyDir:
          medium: Memory
          sizeLimit: 16Mi

      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - frontend
              topologyKey: kubernetes.io/hostname

      terminationGracePeriodSeconds: 30

      containers:
      - name: frontend
        image: REGISTRY/devops-project-frontend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 80
          name: http
          protocol: TCP
        env:
        - name: BACKEND_URL
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: BACKEND_URL

        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
        
        # Container-level security context
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
          add:
          - NET_BIND_SERVICE

        volumeMounts:
        - name: nginx-cache
          mountPath: /var/cache/nginx    
        - name: nginx-run
          mountPath: /var/run            
        - name: nginx-logs
          mountPath: /var/log/nginx     
        - name: tmp
          mountPath: /tmp                

        livenessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          successThreshold: 1
          failureThreshold: 3

      