apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: devops-app

resources:
- namespace.yaml
- configmap.yaml
- deployment-backend.yaml
- deployment-frontend.yaml
- service-backend.yaml
- service-frontend.yaml
- ingress.yaml
- hpa.yaml
- pdb.yaml
- networkpolicies.yaml

images:
- name: REGISTRY/devops-project-backend
  newName: REGISTRY/devops-project-backend
  newTag: latest
- name: REGISTRY/devops-project-frontend
  newName: REGISTRY/devops-project-frontend
  newTag: latest