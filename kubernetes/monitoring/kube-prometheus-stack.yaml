# Deploy kube-prometheus-stack using Helm
apiVersion: v1
kind: Namespace
metadata:
  name: monitoring
  labels:
    name: monitoring
    app.kubernetes.io/name: monitoring-stack

# ServiceMonitor for backend application
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: backend-monitor
  namespace: devops-app
  labels:
    app: backend
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app: backend
  endpoints:
  - port: http
    path: /api/health
    interval: 30s
    scrapeTimeout: 10s
  namespaceSelector:
    matchNames:
    - devops-app

# PrometheusRule for custom alerts
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: devops-app-alerts
  namespace: monitoring
  labels:
    app: kube-prometheus-stack
    release: kube-prometheus-stack
spec:
  groups:
  - name: devops-app.rules
    interval: 30s
    rules:
    - alert: BackendPodDown
      expr: absent(up{app="backend"} == 1)
      for: 2m
      labels:
        severity: critical
        team: devops
      annotations:
        summary: "Backend pod is down"
        description: "Backend pod has been down for more than 2 minutes"
    
    - alert: HighErrorRate
      expr: rate(http_requests_total{status="500"}[5m]) > 0.05
      for: 5m
      labels:
        severity: warning
        team: devops
      annotations:
        summary: "High error rate detected"
        description: "Error rate is {{ $value }}% for the last 5 minutes"
    
    - alert: HighCPUUsage
      expr: sum(rate(container_cpu_usage_seconds_total{namespace="devops-app"}[5m])) by (pod) > 0.8
      for: 5m
      labels:
        severity: warning
        team: devops
      annotations:
        summary: "High CPU usage on {{ $labels.pod }}"
        description: "CPU usage is {{ $value }}% for 5 minutes"
    
    - alert: HighMemoryUsage
      expr: sum(container_memory_working_set_bytes{namespace="devops-app"}) by (pod) / sum(container_spec_memory_limit_bytes{namespace="devops-app"}) by (pod) > 0.9
      for: 5m
      labels:
        severity: warning
        team: devops
      annotations:
        summary: "High memory usage on {{ $labels.pod }}"
        description: "Memory usage is {{ $value | humanizePercentage }}"